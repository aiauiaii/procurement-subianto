<path d="M648 395 L675 395" stroke="#1f7a68" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="681" y="342" width="176" height="110" rx="18" fill="#ffffff" stroke="#d5e0dd" filter="url(#shadow)"/>
