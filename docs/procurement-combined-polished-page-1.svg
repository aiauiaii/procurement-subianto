<text x="980" y="414" text-anchor="middle" font-family="Arial" font-size="11.2" fill="#60727e">Stage 7 approved, ZIP</text>
<text x="980" y="429" text-anchor="middle" font-family="Arial" font-size="11.2" fill="#60727e">tersedia</text>
<g><circle cx="61" cy="498" r="13" fill="#1f7a68"/><text x="61" y="503" text-anchor="middle" font-family="Arial" font-size="13" font-weight="800" fill="#fff">3</text><text x="84" y="503" font-family="Arial" font-size="17" font-weight="800" fill="#13232b">Aturan Kunci Sistem</text></g>
<rect x="48" y="540" width="330" height="136" rx="16" fill="#ffffff" stroke="#d5e0dd" filter="url(#shadow)"/>
<rect x="48" y="540" width="8" height="136" rx="4" fill="#0d6efd"/>
<text x="74" y="572" font-family="Arial" font-size="16" font-weight="800" fill="#0d6efd">Approval per Document</text>
<text x="74" y="602" font-family="Arial" font-size="12" fill="#13232b">- Admin approve/reject tiap document, bukan hanya</text>
<text x="74" y="617" font-family="Arial" font-size="12" fill="#13232b">  per activity.</text>
<text x="74" y="640" font-family="Arial" font-size="12" fill="#13232b">- Rejected document wajib memiliki note agar</text>
<text x="74" y="655" font-family="Arial" font-size="12" fill="#13232b">  requester tahu koreksinya.</text>
<rect x="396" y="540" width="330" height="136" rx="16" fill="#ffffff" stroke="#d5e0dd" filter="url(#shadow)"/>
<rect x="396" y="540" width="8" height="136" rx="4" fill="#1f7a68"/>
<text x="422" y="572" font-family="Arial" font-size="16" font-weight="800" fill="#1f7a68">Accepted Tetap Aman</text>
<text x="422" y="602" font-family="Arial" font-size="12" fill="#13232b">- Document yang sudah approved tidak perlu</text>
<text x="422" y="617" font-family="Arial" font-size="12" fill="#13232b">  diupload ulang.</text>
<text x="422" y="640" font-family="Arial" font-size="12" fill="#13232b">- Requester hanya diminta mengganti document yang</text>
<text x="422" y="655" font-family="Arial" font-size="12" fill="#13232b">  rejected/missing.</text>
<rect x="744" y="540" width="330" height="136" rx="16" fill="#ffffff" stroke="#d5e0dd" filter="url(#shadow)"/>
<rect x="744" y="540" width="8" height="136" rx="4" fill="#a4510f"/>
<text x="770" y="572" font-family="Arial" font-size="16" font-weight="800" fill="#a4510f">Rollback Stage Lama</text>
<text x="770" y="602" font-family="Arial" font-size="12" fill="#13232b">- Jika stage lama direject, stage setelahnya</text>
<text x="770" y="617" font-family="Arial" font-size="12" fill="#13232b">  di-reset.</text>
<text x="770" y="640" font-family="Arial" font-size="12" fill="#13232b">- Dokumen accepted di stage yang direview tetap</text>
<text x="770" y="655" font-family="Arial" font-size="12" fill="#13232b">  dipertahankan.</text>
<text x="562" y="740" text-anchor="middle" font-family="Arial" font-size="12" fill="#60727e">Output akhir: entry complete + seluruh dokumen dapat didownload sebagai ZIP terstruktur per Stage / Activity / Document.</text>
