<text x="347" y="429" text-anchor="middle" font-family="Arial" font-size="11.2" fill="#60727e">review</text>
<path d="M437 395 L464 395" stroke="#1f7a68" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="470" y="342" width="176" height="110" rx="18" fill="#ffffff" stroke="#d5e0dd" filter="url(#shadow)"/>
