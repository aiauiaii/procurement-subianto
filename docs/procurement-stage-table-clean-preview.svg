<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1572" height="850" viewBox="0 0 1572 850">
<rect width="1572" height="850" fill="#ffffff"/>
<text x="26" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#075c50">Procurement Stage, Activity, dan Required Document</text>
<text x="26" y="66" font-family="Arial, sans-serif" font-size="14" fill="#21313a">Peta konteks proses pengadaan dari Stage 1 sampai Stage 7 berdasarkan workflow aktif.</text>
<rect x="26" y="92" width="1520" height="722" fill="#ffffff" stroke="#cfdcd8" stroke-width="1.4"/>
<rect x="26" y="92" width="1520" height="50" fill="#217b68"/>
<text x="44" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Stage</text>
<text x="299" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Konteks / Tujuan</text>
<line x1="281" y1="92" x2="281" y2="814" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="689" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Activity</text>
<line x1="671" y1="92" x2="671" y2="814" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="1134" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Required Document</text>
<line x1="1116" y1="92" x2="1116" y2="814" stroke="#cfdcd8" stroke-width="1.4"/>
<rect x="26" y="142" width="1520" height="96" fill="#ffffff"/>
<line x1="26" y1="142" x2="1546" y2="142" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="169" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 1</text>
<text x="44" y="190" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Perencanaan &amp; Inisiasi</text>
<text x="299" y="169" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Menetapkan kebutuhan, dasar anggaran, dan</text>
<text x="299" y="187.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">permintaan pembelian sebelum proses pengadaan</text>
<text x="299" y="206" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">dimulai.</text>
<text x="689" y="169" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Procurement Planning</text>
<text x="689" y="187.2" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">2. Purchase Request</text>
<text x="1134" y="169" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Procurement Planning: Dokumen Rencana Pengadaan, Feasibility</text>
<text x="1134" y="185.7" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Study, RKAP/RJPP</text>
<text x="1134" y="202.4" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Purchase Request: Purchase Request Document</text>
<rect x="26" y="238" width="1520" height="96" fill="#f8fbfa"/>
<line x1="26" y1="238" x2="1546" y2="238" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="265" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 2</text>
<text x="44" y="286" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Persiapan Pengadaan</text>
<text x="299" y="265" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Menyiapkan tim, ruang lingkup, metode, estimasi</text>
<text x="299" y="283.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">harga, draft kontrak, dan dokumen RFP.</text>
<text x="689" y="265" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Penetapan Tim Pengadaan</text>
<text x="689" y="283.2" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">2. Penyusunan TOR/KAK</text>
<text x="689" y="301.4" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">3. Penetapan Metode</text>
<text x="689" y="319.6" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">4. Penyusunan Draft Kontrak</text>
<text x="689" y="337.8" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">5. Penyusunan OE/HPS</text>
<text x="1134" y="265" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penetapan Tim Pengadaan: SK Tim Pengadaan</text>
<text x="1134" y="281.7" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penyusunan TOR/KAK: Dokumen TOR/KAK</text>
<text x="1134" y="298.4" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penetapan Metode: Nota Metode Pengadaan</text>
<text x="1134" y="315.1" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penyusunan Draft Kontrak: Draft Kontrak</text>
<text x="1134" y="331.8" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penyusunan OE/HPS: Dokumen OE/HPS</text>
<rect x="26" y="334" width="1520" height="96" fill="#ffffff"/>
<line x1="26" y1="334" x2="1546" y2="334" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="361" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 3</text>
<text x="44" y="382" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Pelaksanaan Tender</text>
<text x="299" y="361" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Menjalankan tender mulai dari distribusi</text>
<text x="299" y="379.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">undangan/RFP sampai penerimaan dan pembukaan</text>
<text x="299" y="398" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">penawaran.</text>
<text x="689" y="361" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Sourcing Distribusi RFP</text>
<text x="689" y="379.2" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">2. Penerimaan Proposal</text>
<text x="689" y="397.4" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">3. Pembukaan Penawaran</text>
<text x="1134" y="361" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Sourcing Distribusi RFP: Undangan Tender</text>
<text x="1134" y="377.7" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penerimaan Proposal: Dokumen Proposal Vendor</text>
<text x="1134" y="394.4" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Pembukaan Penawaran: Berita Acara Pembukaan Penawaran</text>
<rect x="26" y="430" width="1520" height="96" fill="#f8fbfa"/>
<line x1="26" y1="430" x2="1546" y2="430" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="457" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 4</text>
<text x="44" y="478" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Evaluasi dan Seleksi</text>
<text x="44" y="499" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Vendor</text>
<text x="299" y="457" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Melakukan evaluasi administrasi, teknis,</text>
<text x="299" y="475.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">klarifikasi, harga, dan menetapkan hasil evaluasi</text>
<text x="299" y="494" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">vendor.</text>
<text x="689" y="457" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Evaluasi Administratif</text>
<text x="689" y="475.2" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">2. Evaluasi Teknis</text>
<text x="689" y="493.4" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">3. Klarifikasi CoQ</text>
<text x="689" y="511.6" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">4. Evaluasi Harga</text>
<text x="689" y="529.8" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">5. Dokumen Hasil Evaluasi</text>
<text x="1134" y="457" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Evaluasi Administratif: Berita Acara Evaluasi Administratif</text>
<text x="1134" y="473.7" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Evaluasi Teknis: Berita Acara Evaluasi Teknis</text>
<text x="1134" y="490.4" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Klarifikasi CoQ: Berita Acara Klarifikasi CoQ</text>
<text x="1134" y="507.1" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Evaluasi Harga: Berita Acara Evaluasi Harga</text>
<text x="1134" y="523.8" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Dokumen Hasil Evaluasi: Berita Acara Hasil Evaluasi</text>
<rect x="26" y="526" width="1520" height="96" fill="#ffffff"/>
<line x1="26" y1="526" x2="1546" y2="526" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="553" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 5</text>
<text x="44" y="574" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Persetujuan &amp; Sistem</text>
<text x="299" y="553" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Meminta dan menyimpan persetujuan hasil tender</text>
<text x="299" y="571.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">sebelum penunjukan vendor.</text>
<text x="689" y="553" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Persetujuan Hasil Tender</text>
<text x="1134" y="553" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Persetujuan Hasil Tender: Dokumen Nota Persetujuan</text>
<rect x="26" y="622" width="1520" height="96" fill="#f8fbfa"/>
<line x1="26" y1="622" x2="1546" y2="622" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="649" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 6</text>
<text x="44" y="670" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Penunjukan &amp; Kontrak</text>
<text x="299" y="649" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Menunjuk vendor, menyiapkan kontrak/LoI,</text>
<text x="299" y="667.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">menandatangani kontrak, dan menerbitkan PO.</text>
<text x="689" y="649" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Surat Penunjukan</text>
<text x="689" y="667.2" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">2. Draft Kontrak &amp; LoI</text>
<text x="689" y="685.4" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">3. Penandatanganan Kontrak</text>
<text x="689" y="703.6" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">4. Purchase Order (PO)</text>
<text x="1134" y="649" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Surat Penunjukan: SPPBJ/LoA</text>
<text x="1134" y="665.7" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Draft Kontrak &amp; LoI: Draft Kontrak, Letter of Intent (LoI)</text>
<text x="1134" y="682.4" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Penandatanganan Kontrak: Dokumen Kontrak</text>
<text x="1134" y="699.1" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Purchase Order (PO): Dokumen Purchase Order (PO)</text>
<rect x="26" y="718" width="1520" height="96" fill="#ffffff"/>
<line x1="26" y1="718" x2="1546" y2="718" stroke="#cfdcd8" stroke-width="1.4"/>
<text x="44" y="745" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Stage 7</text>
<text x="44" y="766" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075c50">Contract Management</text>
<text x="299" y="745" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">Mengelola pelaksanaan kontrak sampai inspeksi,</text>
<text x="299" y="763.5" font-family="Arial, sans-serif" font-size="14.5" font-weight="400" fill="#000000">final acceptance, dan serah terima.</text>
<text x="689" y="745" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">1. Pre-delivery Inspection</text>
<text x="689" y="763.2" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">2. Inspection</text>
<text x="689" y="781.4" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">3. Final Acceptance</text>
<text x="689" y="799.6" font-family="Arial, sans-serif" font-size="14.2" font-weight="400" fill="#000000">4. Serah Terima</text>
<text x="1134" y="745" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Pre-delivery Inspection: Laporan Pre-delivery Inspection</text>
<text x="1134" y="761.7" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Inspection: Laporan Inspection</text>
<text x="1134" y="778.4" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Final Acceptance: Berita Acara Final Acceptance</text>
<text x="1134" y="795.1" font-family="Arial, sans-serif" font-size="12.7" font-weight="400" fill="#000000">Serah Terima: Berita Acara Serah Terima (BAST)</text>
<line x1="26" y1="814" x2="1546" y2="814" stroke="#cfdcd8" stroke-width="1.4"/>
</svg>